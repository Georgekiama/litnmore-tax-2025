<style>
  :root{--maroon:#5F1519;--maroon-dk:#47100F;--gold:#9C7A33;--ink:#262322;--muted:#6E6862;--line:#E7E1DA;--card:#FFFFFF}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,var(--maroon) 0%,var(--maroon-dk) 100%);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;color:var(--ink);padding:24px}
  .box{background:var(--card);width:100%;max-width:420px;border-radius:14px;padding:34px 32px 30px;

  form{display:flex;flex-direction:column;gap:12px}
  input[type=password]{padding:13px 14px;font-size:16px;border:1px solid var(--line);border-radius:9px;width:100%;text-align:center}
  input[type=password]:focus{outline:none;border-color:var(--maroon);box-shadow:0 0 0 3px rgba(95,21,25,.12)}
  button{padding:13px 14px;font-size:15px;font-weight:600;color:#fff;background:var(--maroon);border:0;border-radius:9px;cursor:pointer}
  button:hover{background:var(--maroon-dk)}
  button:disabled{opacity:.55;cursor:not-allowed}
  .msg{font-size:13.5px;margin-top:14px;min-height:18px}
  .err{color:#B00020}
  .countdown{margin-top:20px;padding-top:18px;border-top:1px solid var(--line);font-size:13px;color:var(--muted)}
  .countdown b{color:var(--gold);font-weight:700}
  .expired h1{color:#B00020}
  .foot{margin-top:20px;font-size:11.5px;color:#B7AEA6;letter-spacing:.02em}
</style>

  var EXPIRY_STR = "2026-07-06"; // "YYYY-MM-DD" last day allowed (inclusive)

  var parts = EXPIRY_STR.split("-");
  var EXPIRY = new Date(+parts[0], (+parts[1]) - 1, (+parts[2]) + 1, 0, 0, 0, 0);
  var LAST_DAY_LABEL = new Date(+parts[0], (+parts[1]) - 1, +parts[2])
      .toLocaleDateString(undefined, {weekday:"long", year:"numeric", month:"long", day:"numeric"});

  var form=document.getElementById("form"),pw=document.getElementById("pw"),btn=document.getElementById("btn"),
      msg=document.getElementById("msg"),cd=document.getElementById("countdown"),box=document.getElementById("box");

  function b64ToBytes(s){var bin=atob(s),a=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
  function isExpired(){return new Date()>=EXPIRY;}

  function showExpired(){
    box.classList.add("expired");
    document.getElementById("title").textContent="Access Expired";
    document.getElementById("subtitle").textContent="This document is no longer available.";
    form.style.display="none"; msg.innerHTML="";
    cd.innerHTML="The access window closed after <b>"+LAST_DAY_LABEL+"</b>.<br>Please contact Lit &amp; More, Inc. if you still require it.";
  }

  function renderCountdown(){
    if(isExpired()){showExpired();return;}
    var ms=EXPIRY-new Date();
    var d=Math.floor(ms/86400000),h=Math.floor((ms%86400000)/3600000),m=Math.floor((ms%3600000)/60000);
    cd.innerHTML="Available until end of <b>"+LAST_DAY_LABEL+"</b><br>Time remaining: <b>"+d+"d "+h+"h "+m+"m</b>";
  }

  async function deriveKey(password,salt){
    var baseKey=await crypto.subtle.importKey("raw",new TextEncoder().encode(password),"PBKDF2",false,["deriveKey"]);
    return crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:DATA.iterations,hash:"SHA-256"},baseKey,{name:"AES-GCM",length:256},false,["decrypt"]);
  }

  form.addEventListener("submit",async function(e){
    e.preventDefault();
    if(isExpired()){showExpired();return;}
    msg.className="msg";msg.textContent="Unlocking…";btn.disabled=true;
    try{
      var key=await deriveKey(pw.value,b64ToBytes(DATA.salt));
      var buf=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(DATA.iv)},key,b64ToBytes(DATA.ct));
      var html=new TextDecoder().decode(buf);
      if(isExpired()){showExpired();return;}
      document.open();document.write(html);document.close();
    }catch(err){
      msg.className="msg err";msg.textContent="Incorrect password. Please try again.";
      btn.disabled=false;pw.value="";pw.focus();
    }
  });

  if(isExpired()){showExpired();} else {renderCountdown();setInterval(renderCountdown,30000);}
})();
